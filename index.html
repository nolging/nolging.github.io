<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- PWA: 홈 화면에 추가하면 주소창 없이 전체화면(standalone)으로 실행 -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS(Safari)용: 홈 화면 실행 시 주소창/브라우저 UI 숨김 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Nolging" />

    <!-- 웹폰트: 페이퍼로지는 self-host (src/index.css @font-face, public/fonts) -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/Paperlogy-4Regular.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/Paperlogy-6SemiBold.woff2" crossorigin />

    <title>놀깅, 심심하면 놀기 신청</title>
    <meta name="description" content="놀깅, 심심하면 놀기 신청" />

    <!-- 링크 공유 미리보기 (Open Graph / Twitter) -->
    <meta property="og:title" content="놀깅, 심심하면 놀기 신청" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nolging.github.io/" />
    <meta property="og:image" content="https://nolging.github.io/icon-192.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="놀깅, 심심하면 놀기 신청" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
